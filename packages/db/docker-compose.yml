services:
  postgres:
    image: postgres:17-alpine
    container_name: effect-worker-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: effect_worker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d effect_worker"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - effect-worker-pgdata:/var/lib/postgresql/data

volumes:
  effect-worker-pgdata:
